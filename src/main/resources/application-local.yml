spring:
  application:
    name: monitor

  datasource:
    url: jdbc:mysql://localhost:3307/my_local
    username: root
    password: 1234

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  h2:
    console:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
  metrics:
    distribution:
      # 엔드포인트별 p50/p95/p99 레이턴시 히스토그램
      percentiles-histogram:
        http.server.requests: true
        service.method.duration: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
        service.method.duration: 0.5, 0.95, 0.99
      # SLO 버킷 (ms → 프로메테우스는 초 단위로 변환됨)
      slo:
        http.server.requests: 50ms, 100ms, 300ms, 500ms, 1000ms
        service.method.duration: 50ms, 100ms, 300ms, 500ms, 1000ms

logging:
  level:
    root: INFO
    org.son.monitor: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver: OFF
