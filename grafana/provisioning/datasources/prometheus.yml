apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false
    jsonData:
      # Prometheus와 로그를 연계 (같은 라벨 사용)
      derivedFields:
        - datasourceUid: prometheus
          matcherRegex: '"traceId":"([^"]+)"'
          name: TraceID
          url: '$${__value.raw}'
