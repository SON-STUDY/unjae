server:
  http_listen_port: 9080
  grpc_listen_port: 0

# Loki에 로그 푸시
clients:
  - url: http://loki:3100/loki/api/v1/push

# 포지션 저장 (재시작 시 중복 수집 방지)
positions:
  filename: /tmp/positions.yaml

scrape_configs:
  # ── Docker 컨테이너 로그 자동 수집 ────────────────────────────────────
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: status
            values: ["running"]

    relabel_configs:
      # monitor-app은 Loki4j가 직접 푸시하므로 Promtail 수집 제외
      - source_labels: [__meta_docker_container_name]
        regex: /monitor-app
        action: drop

      # 이름 없는 내부 컨테이너 제외 (라벨 없는 스트림 방지)
      - source_labels: [__meta_docker_container_name]
        regex: /.+
        action: keep

      # 컨테이너 이름을 라벨로 추가
      - source_labels: [__meta_docker_container_name]
        target_label: container
        regex: /(.*)
        replacement: $1

      # 이미지 이름을 라벨로 추가
      - source_labels: [__meta_docker_container_image]
        target_label: image

    pipeline_stages:
      - static_labels:
          log_type: plain
