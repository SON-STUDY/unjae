global:
  scrape_interval: 15s        # 15초마다 메트릭 수집
  evaluation_interval: 15s    # 15초마다 rule 평가
  scrape_timeout: 10s

scrape_configs:
  - job_name: 'spring-monitor'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['app:8080']
    # 수집 주기 오버라이드 (선택)
    scrape_interval: 10s