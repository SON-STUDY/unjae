services:

  # ── Spring Boot App ──────────────────────────────────────────────────
  app:
    build: .
    container_name: monitor-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_USERNAME: root
      DB_PASSWORD: 1234
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - monitor-net
    restart: unless-stopped

  # ── MySQL ─────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: monitor-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: monitor
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - monitor-net
    restart: unless-stopped

  # ── Prometheus ────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: monitor-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"   # 15일치 데이터 보관
      - "--web.enable-lifecycle"               # POST /-/reload 로 설정 핫리로드
    networks:
      - monitor-net
    restart: unless-stopped

  # ── Grafana ───────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    platform: linux/amd64
    container_name: monitor-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/spring-monitor.json
      DISCORD_WEBHOOK_URL: https://discord.com/api/webhooks/1486034606690930750/hkirwiRspwWfBgJfTmvyhId2jWe5M-0xzG3Sl0JIjfMEo89dlDDCkuJOC7w6FtW25GT5
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - monitor-net
    restart: unless-stopped

  # ── Dozzle ────────────────────────────────────────────────────────────
  dozzle:
    image: amir20/dozzle:latest
    container_name: monitor-dozzle
    ports:
      - "8888:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - monitor-net
    restart: unless-stopped

  # ── k6 부하 테스트 (profile: load-test 로 명시적 실행) ────────────────
  k6:
    image: grafana/k6:latest
    container_name: monitor-k6
    profiles: [load-test]
    command: run /scripts/load-test.js
    volumes:
      - ./k6:/scripts:ro
    environment:
      K6_BASE_URL: http://app:8080
    depends_on:
      app:
        condition: service_healthy
    networks:
      - monitor-net

  # ── Promtail (로그 수집 에이전트) ────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.0
    container_name: monitor-promtail
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./loki/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - monitor-net
    restart: unless-stopped

  # ── Loki (로그 저장소) ────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.0
    container_name: monitor-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yml
    networks:
      - monitor-net
    restart: unless-stopped

networks:
  monitor-net:
    driver: bridge

volumes:
  mysql_data:
  prometheus_data:
  grafana_data:
  loki_data:
