services:

  # ── Spring Boot App ──────────────────────────────────────────────────
  app:
    build: .
    container_name: monitor-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_USERNAME: root
      DB_PASSWORD: 1234
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - monitor-net
    restart: unless-stopped

  # ── MySQL ─────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: monitor-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: monitor
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - monitor-net
    restart: unless-stopped

  # ── Prometheus ────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: monitor-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"   # 15일치 데이터 보관
      - "--web.enable-lifecycle"               # POST /-/reload 로 설정 핫리로드
    networks:
      - monitor-net
    restart: unless-stopped

  # ── Grafana ───────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    platform: linux/amd64
    container_name: monitor-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/spring-monitor.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - monitor-net
    restart: unless-stopped

  # ── Dozzle ────────────────────────────────────────────────────────────
  dozzle:
    image: amir20/dozzle:latest
    container_name: monitor-dozzle
    ports:
      - "8888:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - monitor-net
    restart: unless-stopped

networks:
  monitor-net:
    driver: bridge

volumes:
  mysql_data:
  prometheus_data:
  grafana_data:
